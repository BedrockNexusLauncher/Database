name: Sync Minecraft Version Database

# This workflow runs automatically every 12 hours and can also be triggered manually
on:
  schedule:
    - cron: '0 */12 * * *' # Runs at 00:00 and 12:00 UTC daily
  workflow_dispatch: # Allows manual trigger from the GitHub UI Actions tab

permissions:
  contents: write # Grants permissions to commit and push changes back to the repository

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the repository files to the runner environment
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Initialize a Python environment on the runner
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Step 3: Install necessary dependencies (requests library)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # Step 4: Execute the synchronization script
      - name: Run sync script
        run: python sync.py

      # Step 5: Commit and push the generated JSON databases back to the repository
      - name: Commit and push changes
        run: |
          # Configure git bot credentials
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the auto-generated JSON files
          git add versions_uwp.json versions_gdk.json
          
          # Check if there are any actual changes to commit
          if git diff --staged --quiet; then
            echo "No database changes detected. Skipping commit."
          else
            git commit -m "Auto-sync: update version databases [skip ci]"
            git push origin HEAD
          fi
